version: "3.9"

# Use this for local dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    environment:
      DEBUG: "true"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=debug --queues=documents --concurrency=1

  frontend:
    environment:
      NODE_ENV: development